version = "2.0"

[metadata]
author_name = "anonymous"
author_email = "anonymous"
difficulty = "hard"
category = "debugging"
tags = ["rust", "cargo-workspace", "recovery", "replay", "transcript"]
languages = ["rust", "bash"]
codebase_size = "small"
number_of_milestones = 0
subcategories = ["tool_specific"]
expert_time_estimate_min = 60
junior_time_estimate_min = 200

[category_profile]
challenge_family = "replay_transcript_repair"
profile_name = "state_recovery_crash_consistency"
allowed_instruction_disclosures = "symptom narrative, /app repair scope, contract.md path, rx driver path, static-output rejection, and bundled fixture directory scope."
forbidden_instruction_leaks = "exact patch files/functions, oracle target lists, per-scenario answer tables, and implementation recipes for digest/lane/tail helpers."
category_specific_hardness_bar = "Agents must repair multi-crate Rust materialization across the p7 and m2 workspace so regenerated recovery_transcript.json matches contract-derived digests, lanes, tails, and span tokens after cargo rebuild."
category_specific_verifier_risks = "Tests delete output and rebuild; ablation patches revert individual crates to probe discrimination."
coverage_role = "Covers replay-heavy maintenance drift across digest, promotion-tail, and cross-span invariants in a Rust Cargo harness."

[reference_pattern]
justification_if_none = "Calibration follows the accepted overlay-lowerdir-stale-bind Rust Cargo workspace mold: multi-crate repair, cargo rebuild driver, roll_digest summary, and ablation tests that revert individual frontier files."

[agent]
timeout_sec = 1800

[verifier]
timeout_sec = 900

[environment]
allow_internet = false
build_timeout_sec = 600
cpus = 2
memory_mb = 4096
storage_mb = 10240
