[category_profile]
challenge_family = "debugging"
profile_name = "state_recovery_crash_consistency"
allowed_instruction_disclosures = "absolute module-directory paths, the seven JSON flag keys, pointer to /app/environment/docs/replay_audit_contract.md, the rebuild command chain, the determinism requirement, and the fixture path scope."
forbidden_instruction_leaks = "exact file or function patch recipes, answer-key tables tying each flag to a single line edit, the JSON-parser sed pattern, and bolded thresholds tied to a single fix site."
category_specific_hardness_bar = "Agents must map migration_policy.toml and replay_audit_contract.md onto linked C++ across multiple modules, ignore decoy trees, satisfy probe-direct helper tests, and raise all seven report flags with byte-identical reruns."
category_specific_verifier_risks = "Verifier rebuilds must stay deterministic; the probe binary is rebuilt against the agent's modules so hardcoded gate_* helpers cannot mask incorrect underlying functions."
coverage_role = "Exercises strict-ascending admission, barrier-tail discipline, marker-authority epoch arithmetic, tri-state digest gating, and byte+epoch replay pairing as a connected fix front."

[reference_pattern]
justification_if_none = "No promoted reference in docs/reference_tasks/index.json matches this C++/CMake replay-window audit task; the single promoted entry (layered-policy-reload-drift) covers config_policy_precedence, not state_recovery_crash_consistency, so hardness is calibrated independently against the local debugging_cpp_repair sibling task journal-replay-divergence."

[agent]
